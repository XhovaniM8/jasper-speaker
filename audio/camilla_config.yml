devices:
  samplerate: 44100
  chunksize: 1024
  enable_rate_adjust: true
  capture:
    type: Alsa
    channels: 2
    device: "hw:0,1"
    format: S16LE
  playback:
    type: Alsa
    channels: 8
    device: "hw:1,0"
    format: S32LE

filters:
  gain:
    type: Gain
    parameters:
      gain: 0
      inverted: false

mixers:
  stereo_to_8ch:
    channels:
      in: 2
      out: 8
    mapping:
      - dest: 0
        sources:
          - channel: 0
            gain: 0
      - dest: 1
        sources:
          - channel: 1
            gain: 0
      - dest: 2
        sources:
          - channel: 0
            gain: 0
      - dest: 3
        sources:
          - channel: 1
            gain: 0
      - dest: 4
        sources:
          - channel: 0
            gain: 0
      - dest: 5
        sources:
          - channel: 1
            gain: 0
      - dest: 6
        sources:
          - channel: 0
            gain: 0
      - dest: 7
        sources:
          - channel: 1
            gain: 0

pipeline:
  - type: Mixer
    name: stereo_to_8ch
  - type: Filter
    channel: 0
    names:
      - gain
  - type: Filter
    channel: 1
    names:
      - gain

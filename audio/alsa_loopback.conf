# ALSA Loopback Device Configuration
# Deploy to: /etc/modprobe.d/snd-aloop.conf
#
# The snd_aloop module creates a virtual loopback device.
# Squeezelite and HA TTS write to hw:Loopback,0
# CamillaDSP captures from hw:Loopback,1
#
# Load at boot:
#   echo "snd-aloop" | sudo tee -a /etc/modules-load.d/snd-aloop.conf
#   sudo modprobe snd-aloop

options snd-aloop pcm_substreams=2

# ----------------------------------------------------------------
# ALSA card assignment reference (verify with: aplay -l)
#
#   card 0: sndrpihifiberry  — HiFiBerry DAC8x (playback)
#   card 1: Loopback         — snd_aloop virtual device
#     hw:Loopback,0          — write side (Squeezelite / TTS)
#     hw:Loopback,1          — read side  (CamillaDSP capture)
# ----------------------------------------------------------------

# /etc/asound.conf — loopback PCM aliases (optional, for named access)
#
# pcm.loopback_write {
#   type hw
#   card Loopback
#   device 0
# }
#
# pcm.loopback_read {
#   type hw
#   card Loopback
#   device 1
# }
